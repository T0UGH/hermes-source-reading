<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.6"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow-cyan" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect width="1600" height="980" fill="url(#grid)" opacity="0.35"/>

  <text x="120" y="88" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="34" font-weight="700">Hermes 自我进化闭环总图</text>
  <text x="120" y="124" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="18">它不是“多了记忆的 agent”，而是把经验处理做成了持续增强自己的系统</text>

  <!-- arrows behind boxes -->
  <path d="M 800 270 C 800 210, 800 190, 800 170" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow-cyan)" opacity="0.85"/>
  <path d="M 1040 500 C 1130 500, 1180 500, 1230 500" stroke="#34d399" stroke-width="4" marker-end="url(#arrow-emerald)" opacity="0.85"/>
  <path d="M 800 730 C 800 790, 800 820, 800 850" stroke="#a78bfa" stroke-width="4" marker-end="url(#arrow-violet)" opacity="0.85"/>
  <path d="M 560 500 C 470 500, 420 500, 370 500" stroke="#fb923c" stroke-width="4" marker-end="url(#arrow-orange)" opacity="0.85"/>

  <path d="M 800 170 C 1060 170, 1240 290, 1240 500" stroke="#22d3ee" stroke-width="2.5" stroke-dasharray="10 8" fill="none" opacity="0.55"/>
  <path d="M 1240 500 C 1240 710, 1060 850, 800 850" stroke="#34d399" stroke-width="2.5" stroke-dasharray="10 8" fill="none" opacity="0.55"/>
  <path d="M 800 850 C 540 850, 360 710, 360 500" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="10 8" fill="none" opacity="0.55"/>
  <path d="M 360 500 C 360 290, 540 170, 800 170" stroke="#fb923c" stroke-width="2.5" stroke-dasharray="10 8" fill="none" opacity="0.55"/>

  <!-- center -->
  <rect x="560" y="380" width="480" height="240" rx="22" fill="#0f172a"/>
  <rect x="560" y="380" width="480" height="240" rx="22" fill="rgba(15, 23, 42, 0.82)" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="438" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="30" font-weight="700" text-anchor="middle">Hermes Runtime Core</text>
  <text x="800" y="472" fill="#CBD5E1" font-family="JetBrains Mono, monospace" font-size="17" text-anchor="middle">run_agent.py 把经验处理系统重新接回主体循环</text>
  <text x="800" y="525" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="16" text-anchor="middle">不是直接靠模型权重在线学习，而是靠系统越来越会处理自己的过去经验</text>
  <text x="800" y="565" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="18" font-weight="600" text-anchor="middle">四条闭环在这里汇合</text>
  <text x="800" y="600" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="15" text-anchor="middle">memory context / session recall / skills / compression</text>

  <!-- top -->
  <rect x="520" y="120" width="560" height="120" rx="18" fill="#0f172a"/>
  <rect x="520" y="120" width="560" height="120" rx="18" fill="rgba(8, 51, 68, 0.42)" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="164" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700" text-anchor="middle">持久记忆闭环</text>
  <text x="800" y="196" fill="#CFFAFE" font-family="JetBrains Mono, monospace" font-size="16" text-anchor="middle">MEMORY.md / USER.md / frozen snapshot</text>
  <text x="800" y="223" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">沉淀稳定事实：用户偏好、环境事实、项目约定、工具 quirks</text>

  <!-- right -->
  <rect x="1180" y="380" width="320" height="240" rx="18" fill="#0f172a"/>
  <rect x="1180" y="380" width="320" height="240" rx="18" fill="rgba(6, 78, 59, 0.42)" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
  <text x="1340" y="428" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700" text-anchor="middle">会话回忆闭环</text>
  <text x="1340" y="462" fill="#D1FAE5" font-family="JetBrains Mono, monospace" font-size="16" text-anchor="middle">SQLite + FTS5 + focused summary</text>
  <text x="1340" y="510" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">不是历史回放</text>
  <text x="1340" y="536" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">而是按需把过去会话</text>
  <text x="1340" y="562" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">重构成当前可用经验</text>

  <!-- bottom -->
  <rect x="520" y="740" width="560" height="120" rx="18" fill="#0f172a"/>
  <rect x="520" y="740" width="560" height="120" rx="18" fill="rgba(76, 29, 149, 0.42)" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="784" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700" text-anchor="middle">技能沉淀闭环</text>
  <text x="800" y="818" fill="#E9D5FF" font-family="JetBrains Mono, monospace" font-size="16" text-anchor="middle">skills = procedural memory</text>
  <text x="800" y="845" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">不是只记住事实，而是把成功做法沉淀成之后可复用的操作程序</text>

  <!-- left -->
  <rect x="100" y="380" width="320" height="240" rx="18" fill="#0f172a"/>
  <rect x="100" y="380" width="320" height="240" rx="18" fill="rgba(251, 146, 60, 0.28)" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="428" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700" text-anchor="middle">上下文自优化闭环</text>
  <text x="260" y="462" fill="#FFEDD5" font-family="JetBrains Mono, monospace" font-size="16" text-anchor="middle">compression / caching / trajectory</text>
  <text x="260" y="510" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">不是越记越重</text>
  <text x="260" y="536" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">而是把历史整理成</text>
  <text x="260" y="562" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">还能继续工作的形式</text>

  <text x="120" y="930" fill="#CBD5E1" font-family="JetBrains Mono, monospace" font-size="18">一句话：Hermes 的强项不是“会做一次任务”，而是“会把任务经验变成下一次还能继续使用的能力”。</text>
</svg>
