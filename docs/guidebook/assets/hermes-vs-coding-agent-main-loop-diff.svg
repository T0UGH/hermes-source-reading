<svg width="1800" height="1120" viewBox="0 0 1800 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.55"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <marker id="arrow-slate" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1800" height="1120" fill="url(#bg)"/>
  <rect width="1800" height="1120" fill="url(#grid)" opacity="0.35"/>

  <text x="110" y="82" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="34" font-weight="700">Hermes 与 coding agent 主循环差异图</text>
  <text x="110" y="116" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="18">同样都有 tool-calling loop，但主循环真正维持的对象并不一样</text>

  <!-- headers -->
  <rect x="100" y="160" width="480" height="72" rx="14" fill="#0f172a"/>
  <rect x="100" y="160" width="480" height="72" rx="14" fill="rgba(6,78,59,0.38)" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="205" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700" text-anchor="middle">Codex</text>
  <text x="340" y="228" fill="#D1FAE5" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">当前 coding work-round</text>

  <rect x="660" y="160" width="480" height="72" rx="14" fill="#0f172a"/>
  <rect x="660" y="160" width="480" height="72" rx="14" fill="rgba(120,53,15,0.34)" stroke="#fbbf24" stroke-width="2" filter="url(#shadow)"/>
  <text x="900" y="205" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700" text-anchor="middle">Claude Code</text>
  <text x="900" y="228" fill="#FEF3C7" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">coding runtime / permissions / hooks / subagents</text>

  <rect x="1220" y="160" width="480" height="72" rx="14" fill="#0f172a"/>
  <rect x="1220" y="160" width="480" height="72" rx="14" fill="rgba(8,51,68,0.38)" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
  <text x="1460" y="205" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700" text-anchor="middle">Hermes</text>
  <text x="1460" y="228" fill="#CFFAFE" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">经验处理内核 / self-evolution loop</text>

  <!-- codex lane -->
  <g filter="url(#shadow)">
    <rect x="120" y="290" width="440" height="110" rx="16" fill="#0f172a"/>
    <rect x="120" y="290" width="440" height="110" rx="16" fill="rgba(6,78,59,0.38)" stroke="#34d399" stroke-width="2"/>
    <text x="340" y="332" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" text-anchor="middle">当前工作面</text>
    <text x="340" y="362" fill="#D1FAE5" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">组织本轮 turn 的工作现场</text>
    <text x="340" y="387" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">关心这轮代码任务要在什么状态上推进</text>

    <rect x="120" y="460" width="440" height="110" rx="16" fill="#0f172a"/>
    <rect x="120" y="460" width="440" height="110" rx="16" fill="rgba(6,78,59,0.38)" stroke="#34d399" stroke-width="2"/>
    <text x="340" y="502" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" text-anchor="middle">sampling / action path</text>
    <text x="340" y="532" fill="#D1FAE5" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">同一回合里判断是否进入工具/动作路径</text>
    <text x="340" y="557" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">重点是“这轮怎么继续做完”</text>

    <rect x="120" y="630" width="440" height="110" rx="16" fill="#0f172a"/>
    <rect x="120" y="630" width="440" height="110" rx="16" fill="rgba(6,78,59,0.38)" stroke="#34d399" stroke-width="2"/>
    <text x="340" y="672" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" text-anchor="middle">结果回流 / continue-stop</text>
    <text x="340" y="702" fill="#D1FAE5" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">结果写回当前 turn，再判断是否收口</text>
    <text x="340" y="727" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">核心是任务执行闭环</text>
  </g>

  <!-- claude lane -->
  <g filter="url(#shadow)">
    <rect x="680" y="290" width="440" height="110" rx="16" fill="#0f172a"/>
    <rect x="680" y="290" width="440" height="110" rx="16" fill="rgba(120,53,15,0.34)" stroke="#fbbf24" stroke-width="2"/>
    <text x="900" y="332" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" text-anchor="middle">project runtime</text>
    <text x="900" y="362" fill="#FEF3C7" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">目录、规则、项目记忆、worktree</text>
    <text x="900" y="387" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">关心代码工作流如何稳定运行</text>

    <rect x="680" y="460" width="440" height="110" rx="16" fill="#0f172a"/>
    <rect x="680" y="460" width="440" height="110" rx="16" fill="rgba(120,53,15,0.34)" stroke="#fbbf24" stroke-width="2"/>
    <text x="900" y="502" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" text-anchor="middle">permissions / hooks / tools</text>
    <text x="900" y="532" fill="#FEF3C7" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">执行前治理层包住 tool loop</text>
    <text x="900" y="557" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">重点是 coding runtime 的治理结构</text>

    <rect x="680" y="630" width="440" height="110" rx="16" fill="#0f172a"/>
    <rect x="680" y="630" width="440" height="110" rx="16" fill="rgba(120,53,15,0.34)" stroke="#fbbf24" stroke-width="2"/>
    <text x="900" y="672" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" text-anchor="middle">subagents / agent teams</text>
    <text x="900" y="702" fill="#FEF3C7" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">子代理、hook、MCP 围绕代码工作编排</text>
    <text x="900" y="727" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">核心是 coding runtime 闭环</text>
  </g>

  <!-- hermes lane -->
  <g filter="url(#shadow)">
    <rect x="1240" y="290" width="440" height="110" rx="16" fill="#0f172a"/>
    <rect x="1240" y="290" width="440" height="110" rx="16" fill="rgba(8,51,68,0.38)" stroke="#22d3ee" stroke-width="2"/>
    <text x="1460" y="332" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" text-anchor="middle">prefetch past experience</text>
    <text x="1460" y="362" fill="#CFFAFE" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">memory / session recall 先作为当前工作材料进入</text>
    <text x="1460" y="387" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">重点是“过去经验怎样先接进这轮”</text>

    <rect x="1240" y="460" width="440" height="110" rx="16" fill="#0f172a"/>
    <rect x="1240" y="460" width="440" height="110" rx="16" fill="rgba(8,51,68,0.38)" stroke="#22d3ee" stroke-width="2"/>
    <text x="1460" y="502" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" text-anchor="middle">tool loop + approval + delegate</text>
    <text x="1460" y="532" fill="#CFFAFE" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">执行只是中段，主循环还要考虑经验处理</text>
    <text x="1460" y="557" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">重点不是只把任务做完</text>

    <rect x="1240" y="630" width="440" height="140" rx="16" fill="#0f172a"/>
    <rect x="1240" y="630" width="440" height="140" rx="16" fill="rgba(8,51,68,0.38)" stroke="#22d3ee" stroke-width="2"/>
    <text x="1460" y="672" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" text-anchor="middle">sync / skills / compression</text>
    <text x="1460" y="702" fill="#CFFAFE" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle">turn 结束后继续做经验沉淀、skill review、context optimization</text>
    <text x="1460" y="728" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">核心是经验沉淀闭环，而不是只停在任务执行闭环</text>
    <text x="1460" y="752" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">这是 Hermes 最像 self-evolution kernel 的地方</text>
  </g>

  <!-- vertical arrows -->
  <path d="M 340 400 L 340 455" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow-slate)"/>
  <path d="M 340 570 L 340 625" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow-slate)"/>
  <path d="M 900 400 L 900 455" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow-slate)"/>
  <path d="M 900 570 L 900 625" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow-slate)"/>
  <path d="M 1460 400 L 1460 455" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow-slate)"/>
  <path d="M 1460 570 L 1460 625" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow-slate)"/>

  <!-- footer cards -->
  <rect x="100" y="860" width="520" height="170" rx="18" fill="#0f172a"/>
  <rect x="100" y="860" width="520" height="170" rx="18" fill="rgba(30,41,59,0.48)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="140" y="905" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">Codex / Claude Code 更像什么？</text>
  <text x="140" y="940" fill="#CBD5E1" font-family="JetBrains Mono, monospace" font-size="15">更像 coding work runtime：</text>
  <text x="140" y="970" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14">- 当前任务怎样推进</text>
  <text x="140" y="996" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14">- 工具怎样执行</text>
  <text x="140" y="1022" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14">- 权限 / 工作流 / 当前回合怎样收口</text>

  <rect x="660" y="860" width="520" height="170" rx="18" fill="#0f172a"/>
  <rect x="660" y="860" width="520" height="170" rx="18" fill="rgba(8,51,68,0.28)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="700" y="905" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">Hermes 更像什么？</text>
  <text x="700" y="940" fill="#CFFAFE" font-family="JetBrains Mono, monospace" font-size="15">更像 experience-processing kernel：</text>
  <text x="700" y="970" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14">- 过去经验怎样先进入当前回合</text>
  <text x="700" y="996" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14">- 当前任务结束后哪些经验会被留下</text>
  <text x="700" y="1022" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="14">- 系统怎样越来越会利用自己的过去</text>

  <rect x="1220" y="860" width="480" height="170" rx="18" fill="#0f172a"/>
  <rect x="1220" y="860" width="480" height="170" rx="18" fill="rgba(76,29,149,0.34)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="1260" y="905" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">一句 retained takeaway</text>
  <text x="1260" y="955" fill="#E9D5FF" font-family="JetBrains Mono, monospace" font-size="15">Hermes 最不同的地方，不是它也会调工具，</text>
  <text x="1260" y="985" fill="#E9D5FF" font-family="JetBrains Mono, monospace" font-size="15">而是它把经验处理直接做成了主循环的一部分。</text>
</svg>
