<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hermes self-evolution loop 总装图</title>
  <desc id="desc">A loop showing memory as background, recall as on-demand retrieval, task execution, background review, routing to memory skills and session history, compression as history-shaping layer, and return to the next main loop.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1280" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="memoryGrad" x1="180" y1="130" x2="500" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCEBFF"/>
      <stop offset="1" stop-color="#C3DAFF"/>
    </linearGradient>
    <linearGradient id="recallGrad" x1="860" y1="120" x2="1200" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DDF7EC"/>
      <stop offset="1" stop-color="#C3EEDC"/>
    </linearGradient>
    <linearGradient id="taskGrad" x1="510" y1="310" x2="900" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF4D6"/>
      <stop offset="1" stop-color="#FFE4A8"/>
    </linearGradient>
    <linearGradient id="reviewGrad" x1="520" y1="540" x2="890" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE2E0"/>
      <stop offset="1" stop-color="#FFC8C3"/>
    </linearGradient>
    <linearGradient id="skillGrad" x1="1000" y1="560" x2="1280" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8E0FF"/>
      <stop offset="1" stop-color="#D1C4FF"/>
    </linearGradient>
    <linearGradient id="sessionGrad" x1="160" y1="560" x2="430" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E2F3FF"/>
      <stop offset="1" stop-color="#C7E6FF"/>
    </linearGradient>
    <linearGradient id="compressionGrad" x1="170" y1="740" x2="1230" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0EDFF"/>
      <stop offset="1" stop-color="#E1DCFF"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#3D5A80"/>
    </marker>
    <filter id="shadow" x="0" y="0" width="1400" height="920" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>
    <style>
      .panel { stroke:#335C85; stroke-width:2.5; rx:26; filter:url(#shadow); }
      .title { font: 700 28px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#16324F; }
      .label { font: 700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#17324D; }
      .body { font: 500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#27435D; }
      .small { font: 600 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#34506E; }
      .loop { fill:none; stroke:#3D5A80; stroke-width:5; marker-end:url(#arrow); stroke-linecap:round; stroke-linejoin:round; }
      .dashed { fill:none; stroke:#567A9E; stroke-width:4; stroke-dasharray:12 10; marker-end:url(#arrow); stroke-linecap:round; }
    </style>
  </defs>

  <rect x="40" y="40" width="1320" height="840" rx="36" fill="url(#bg)" stroke="#C7D6EA" stroke-width="2"/>
  <text x="700" y="95" text-anchor="middle" class="title">Hermes self-evolution loop 总装图</text>
  <text x="700" y="128" text-anchor="middle" class="body">不是平铺模块，而是“过去进入现在 / 现在回流未来”的闭环</text>

  <rect x="150" y="150" width="340" height="140" class="panel" fill="url(#memoryGrad)"/>
  <text x="320" y="195" text-anchor="middle" class="label">memory</text>
  <text x="320" y="228" text-anchor="middle" class="body">稳定事实、用户偏好、项目约定</text>
  <text x="320" y="258" text-anchor="middle" class="small">作为下轮 system prompt 的背景地板</text>

  <rect x="910" y="150" width="340" height="140" class="panel" fill="url(#recallGrad)"/>
  <text x="1080" y="195" text-anchor="middle" class="label">recall</text>
  <text x="1080" y="228" text-anchor="middle" class="body">按需召回旧会话、聚合、focused summary</text>
  <text x="1080" y="258" text-anchor="middle" class="small">把相关过去经验拉回当前场景</text>

  <rect x="500" y="320" width="400" height="160" class="panel" fill="url(#taskGrad)"/>
  <text x="700" y="365" text-anchor="middle" class="label">当前主循环</text>
  <text x="700" y="400" text-anchor="middle" class="body">用户任务 → 推理 / 调工具 → 输出结果</text>
  <text x="700" y="430" text-anchor="middle" class="small">这一轮同时产生新的事实、过程、做法与判断</text>

  <rect x="510" y="550" width="380" height="150" class="panel" fill="url(#reviewGrad)"/>
  <text x="700" y="595" text-anchor="middle" class="label">background review</text>
  <text x="700" y="628" text-anchor="middle" class="body">响应之后重新审视这一轮</text>
  <text x="700" y="658" text-anchor="middle" class="small">决定什么该进入 memory / skills / session history</text>

  <rect x="1000" y="560" width="250" height="130" class="panel" fill="url(#skillGrad)"/>
  <text x="1125" y="603" text-anchor="middle" class="label">skills</text>
  <text x="1125" y="635" text-anchor="middle" class="body">把成功做法写成</text>
  <text x="1125" y="660" text-anchor="middle" class="body">procedural memory</text>

  <rect x="150" y="560" width="250" height="130" class="panel" fill="url(#sessionGrad)"/>
  <text x="275" y="603" text-anchor="middle" class="label">session history</text>
  <text x="275" y="635" text-anchor="middle" class="body">完整保留会话材料</text>
  <text x="275" y="660" text-anchor="middle" class="body">供未来按需 recall</text>

  <rect x="180" y="745" width="1040" height="95" class="panel" fill="url(#compressionGrad)"/>
  <text x="700" y="785" text-anchor="middle" class="label">compression / caching</text>
  <text x="700" y="815" text-anchor="middle" class="body">把越来越长的历史整理成还能继续工作的形状，避免上下文膨胀拖垮整个循环</text>

  <path class="loop" d="M490 220 C580 220 600 270 635 320"/>
  <path class="loop" d="M910 220 C820 220 800 270 765 320"/>
  <path class="loop" d="M700 480 L700 550"/>
  <path class="loop" d="M510 625 C465 625 430 625 400 625"/>
  <path class="loop" d="M890 625 C930 625 960 625 1000 625"/>
  <path class="dashed" d="M275 690 C275 760 360 790 500 790"/>
  <path class="dashed" d="M1125 690 C1125 760 1040 790 900 790"/>
  <path class="loop" d="M700 745 C700 690 700 705 700 700"/>
  <path class="loop" d="M180 792 C120 792 95 700 95 520 C95 260 170 120 320 120 C490 120 560 150 560 150"/>
  <path class="loop" d="M1220 792 C1280 792 1305 700 1305 520 C1305 260 1230 120 1080 120 C910 120 840 150 840 150"/>

  <text x="532" y="197" class="small">默认进入下一轮</text>
  <text x="825" y="197" class="small" text-anchor="end">当前 query 触发</text>
  <text x="732" y="520" class="small">事后分流</text>
  <text x="432" y="610" class="small">留作未来召回材料</text>
  <text x="964" y="610" class="small" text-anchor="end">升级成可重复能力</text>
  <text x="700" y="872" text-anchor="middle" class="small">总闭环：过去被保存、筛选、重写，再回到下一轮主循环</text>
</svg>
