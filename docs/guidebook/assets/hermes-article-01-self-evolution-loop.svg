<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hermes 自我进化闭环总图</title>
  <desc id="desc">A loop diagram emphasizing Hermes as an agent that keeps accumulating itself: current task enters memory, recall, skills, compression and review, then returns stronger to the next round.</desc>
  <defs>
    <linearGradient id="bg" x1="100" y1="70" x2="1300" y2="830" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="420" y1="250" x2="980" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF3D4"/>
      <stop offset="1" stop-color="#FFE4A8"/>
    </linearGradient>
    <linearGradient id="memoryGrad" x1="160" y1="150" x2="470" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCEBFF"/>
      <stop offset="1" stop-color="#C5DCFF"/>
    </linearGradient>
    <linearGradient id="recallGrad" x1="930" y1="150" x2="1240" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DEF7ED"/>
      <stop offset="1" stop-color="#C6EEDA"/>
    </linearGradient>
    <linearGradient id="skillsGrad" x1="990" y1="520" x2="1260" y2="690" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAE2FF"/>
      <stop offset="1" stop-color="#D5C9FF"/>
    </linearGradient>
    <linearGradient id="compressionGrad" x1="170" y1="560" x2="470" y2="710" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E1F3FF"/>
      <stop offset="1" stop-color="#CAE7FF"/>
    </linearGradient>
    <linearGradient id="reviewGrad" x1="470" y1="640" x2="950" y2="810" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE3E0"/>
      <stop offset="1" stop-color="#FFC9C3"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#375A7F"/>
    </marker>
    <filter id="shadow" x="0" y="0" width="1400" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>
    <style>
      .panel { stroke:#335C85; stroke-width:2.5; rx:26; filter:url(#shadow); }
      .title { font:700 30px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#16324F; }
      .subtitle { font:500 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#33506C; }
      .label { font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#17324D; }
      .body { font:500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#27435D; }
      .small { font:600 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#3E5B78; }
      .loop { fill:none; stroke:#3D5A80; stroke-width:5; marker-end:url(#arrow); stroke-linecap:round; stroke-linejoin:round; }
      .soft { fill:none; stroke:#5E7FA3; stroke-width:4; stroke-dasharray:12 10; marker-end:url(#arrow); stroke-linecap:round; }
    </style>
  </defs>

  <rect x="40" y="40" width="1320" height="820" rx="36" fill="url(#bg)" stroke="#C7D6EA" stroke-width="2"/>
  <text x="700" y="94" text-anchor="middle" class="title">Hermes 自我进化闭环总图</text>
  <text x="700" y="127" text-anchor="middle" class="subtitle">重点不是“功能很多”，而是每一轮都会把过去整理成下一轮可继续使用的自己</text>

  <rect x="470" y="245" width="460" height="210" class="panel" fill="url(#coreGrad)"/>
  <text x="700" y="300" text-anchor="middle" class="label">当前任务 / 当前主循环</text>
  <text x="700" y="340" text-anchor="middle" class="body">用户问题 → 推理 / 调工具 → 产出结果</text>
  <text x="700" y="372" text-anchor="middle" class="body">这一轮同时生成新的事实、过程、方法与历史负担</text>
  <text x="700" y="412" text-anchor="middle" class="small">Hermes 的关键，不是只完成当下，而是把这一轮变成下一轮的输入</text>

  <rect x="150" y="150" width="300" height="140" class="panel" fill="url(#memoryGrad)"/>
  <text x="300" y="194" text-anchor="middle" class="label">memory</text>
  <text x="300" y="228" text-anchor="middle" class="body">沉淀稳定事实</text>
  <text x="300" y="258" text-anchor="middle" class="small">用户偏好 / 项目约定 / 环境知识</text>

  <rect x="950" y="150" width="300" height="140" class="panel" fill="url(#recallGrad)"/>
  <text x="1100" y="194" text-anchor="middle" class="label">recall</text>
  <text x="1100" y="228" text-anchor="middle" class="body">按需找回旧经验</text>
  <text x="1100" y="258" text-anchor="middle" class="small">相关 session 被重组为当前可用回忆</text>

  <rect x="980" y="530" width="280" height="150" class="panel" fill="url(#skillsGrad)"/>
  <text x="1120" y="575" text-anchor="middle" class="label">skills</text>
  <text x="1120" y="608" text-anchor="middle" class="body">把一次成功</text>
  <text x="1120" y="635" text-anchor="middle" class="body">升级成可重复方法</text>

  <rect x="150" y="545" width="300" height="145" class="panel" fill="url(#compressionGrad)"/>
  <text x="300" y="590" text-anchor="middle" class="label">compression</text>
  <text x="300" y="624" text-anchor="middle" class="body">整理越来越长的历史</text>
  <text x="300" y="654" text-anchor="middle" class="small">保证系统不会被自己的过去拖垮</text>

  <rect x="500" y="645" width="400" height="150" class="panel" fill="url(#reviewGrad)"/>
  <text x="700" y="690" text-anchor="middle" class="label">review</text>
  <text x="700" y="722" text-anchor="middle" class="body">事后判断什么值得留下、怎样留下</text>
  <text x="700" y="754" text-anchor="middle" class="small">把事实送进 memory，把方法送进 skills，把过程留给 recall</text>

  <path class="loop" d="M450 220 C540 220 585 250 620 245"/>
  <path class="loop" d="M950 220 C860 220 815 250 780 245"/>
  <path class="loop" d="M930 370 C1020 400 1085 455 1110 530"/>
  <path class="loop" d="M990 650 C950 650 920 650 900 690"/>
  <path class="loop" d="M500 690 C470 650 420 640 450 618"/>
  <path class="loop" d="M450 585 C530 510 570 470 620 455"/>
  <path class="soft" d="M700 455 L700 645"/>
  <path class="soft" d="M1110 150 C1220 95 1290 140 1290 315 C1290 520 1250 690 1120 735 C990 780 915 775 915 775"/>
  <path class="soft" d="M300 545 C170 520 110 430 110 315 C110 150 175 95 300 150"/>

  <text x="528" y="205" class="small">稳定事实先进入下一轮</text>
  <text x="872" y="205" text-anchor="end" class="small">需要时把过去拉回当前</text>
  <text x="1010" y="505" class="small">一次做好 ≠ 只留在聊天里</text>
  <text x="468" y="560" class="small">长历史被重新整理</text>
  <text x="720" y="615" class="small">事后分流</text>
  <text x="700" y="835" text-anchor="middle" class="subtitle">闭环结果：Hermes 不是“会记一点东西”，而是会持续积累、整理并复用自己的 agent</text>
</svg>
