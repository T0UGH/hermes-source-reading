site_name: Hermes 源码导读
site_description: 一套围绕 Hermes 怎样把经验沉淀成长期能力重新组织的中文源码导读手册
site_url: https://t0ugh.github.io/hermes-source-reading/
repo_url: https://github.com/T0UGH/hermes-source-reading
repo_name: T0UGH/hermes-source-reading

docs_dir: docs
site_dir: site

use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

exclude_docs: |
  .git/**
  .github/**
  site/**
  README-writing-cards-v1.md
  guidebook/README-writing-cards-v1.md
  guidebook/2026-04-17-Hermes-特色与不同点系列规划-v1.md
  *.py
  *.sh

validation:
  omitted_files: ignore
  absolute_links: warn
  unrecognized_links: warn

extra_css:
  - stylesheets/mermaid.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - 首页: index.md
  - 开始阅读｜Hermes 自我进化 guidebook: guidebook/README.md
  - 阅读路线图: guidebook/2026-04-16-Hermes-自我进化阅读路线图-v1.md
  - Hermes 自我进化机制（01-09）:
      - 01 为什么 Hermes 不是“有记忆的 agent”，而是“能持续积累自己的 agent”: guidebook/01-为什么-Hermes-不是-有记忆的-agent-而是-能持续积累自己的-agent.md
      - 02 从主循环看，Hermes 与 coding agent 有什么不同: guidebook/02-从主循环看-Hermes-与-coding-agent-有什么不同.md
      - 03 Hermes 到底把什么存下来了：从静态文件层看它怎样为自我进化准备长期材料: guidebook/03-Hermes-到底把什么存下来了-从静态文件层看它怎样为自我进化准备长期材料.md
      - 04 为什么 Hermes 会把持久记忆直接接进主循环: guidebook/04-为什么-Hermes-会把持久记忆直接接进主循环.md
      - 05 session recall 为什么不是历史回放，而是按需重构过去经验: guidebook/05-session-recall-为什么不是历史回放-而是按需重构过去经验.md
      - 06 为什么 skill system 才是 Hermes 最像自我进化的地方: guidebook/06-为什么-skill-system-才是-Hermes-最像自我进化的地方.md
      - 07 为什么 Hermes 不只是压缩上下文，而是在整理自己的过去: guidebook/07-为什么-Hermes-不只是压缩上下文-而是在整理自己的过去.md
      - 08 为什么 Hermes 的主循环收口后还没结束：background review 才是经验沉淀的关键转折: guidebook/08-为什么-Hermes-的主循环收口后还没结束-background-review-才是经验沉淀的关键转折.md
      - 09 Hermes 怎样把 memory、recall、skills、compression 接成真正的 self-evolution loop: guidebook/09-Hermes-怎样把-memory-recall-skills-compression-接成真正的-self-evolution-loop.md